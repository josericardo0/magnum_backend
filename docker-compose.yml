version: '3.8'

services:

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_DB: test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"


  api-1:
    build: ./api-1
    container_name: api-1
    depends_on:
      - rabbitmq
      - postgres
    ports:
      - "8080:8080"
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/test
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: postgres

      MP_MESSAGING_OUTGOING_MARCAS_OUT_CONNECTOR: smallrye-rabbitmq
      MP_MESSAGING_OUTGOING_MARCAS_OUT_QUEUE_NAME: marcas
      MP_MESSAGING_OUTGOING_MARCAS_OUT_HOST: rabbitmq
      MP_MESSAGING_OUTGOING_MARCAS_OUT_PORT: 5672
      MP_MESSAGING_OUTGOING_MARCAS_OUT_USERNAME: guest
      MP_MESSAGING_OUTGOING_MARCAS_OUT_PASSWORD: guest

  api-2:
    build: ./api-2
    container_name: api-2
    depends_on:
      - rabbitmq
      - postgres
    ports:
      - "8081:8080"
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/test
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: postgres

      MP_MESSAGING_INCOMING_MARCAS_IN_CONNECTOR: smallrye-rabbitmq
      MP_MESSAGING_INCOMING_MARCAS_IN_QUEUE_NAME: marcas
      MP_MESSAGING_INCOMING_MARCAS_IN_HOST: rabbitmq
      MP_MESSAGING_INCOMING_MARCAS_IN_PORT: 5672
      MP_MESSAGING_INCOMING_MARCAS_IN_USERNAME: guest
      MP_MESSAGING_INCOMING_MARCAS_IN_PASSWORD: guest